 {"n": 47, "answer": "B", "q": "某顧問公司導入生成式 AI，協助團隊快速檢索並摘要長篇的法規文件。為了改善檢索結果常出現不相關或過於分散內容的問題，下列何者為團隊決定對文件進行文本切分（Chunking）的主要目的？",

const letters = ['A','B','C','D'];
const list = document.getElementById('questionList');

function render() {
  list.innerHTML = questions.map(item => `
    <section class="question-card" id="q-${item.n}">
      <div class="qhead">
        <div class="qnum">第 ${item.n} 題</div>
        <div class="qtext">${escapeHtml(item.q)}</div>
        <div class="status" id="status-${item.n}">尚未提交</div>
      </div>
      <div class="options">
        ${letters.map(letter => `
          <label class="opt" id="q${item.n}-${letter}">
            <input type="radio" name="q${item.n}" value="${letter}">
            <strong>${letter}.</strong> ${escapeHtml(item.opts[letter] || '')}
          </label>
        `).join('')}
      </div>
      <div class="actions">
        <button class="btn-primary" onclick="submitQuestion(${item.n})">提交本題</button>
        <button class="btn-secondary" onclick="resetQuestion(${item.n})">重作本題</button>
      </div>
      <div class="feedback" id="feedback-${item.n}"></div>
      <div class="explanation" id="explanation-${item.n}">
        <h4>解析</h4>
        <textarea placeholder="請直接在題庫資料中的 explanation 欄位填入這題解析。">${escapeHtml(item.explanation || '')}</textarea>
      </div>
    </section>
  `).join('');
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function submitQuestion(n) {
  const q = questions.find(x => x.n === n);
  const chosen = document.querySelector(`input[name="q${n}"]:checked`);
  const feedback = document.getElementById(`feedback-${n}`);
  const status = document.getElementById(`status-${n}`);
  const explanation = document.getElementById(`explanation-${n}`);

  letters.forEach(letter => {
    document.getElementById(`q${n}-${letter}`).classList.remove('correct', 'wrong');
  });

  if (!chosen) {
    feedback.className = 'feedback empty';
    feedback.innerHTML = '<strong>還沒作答</strong>請先選一個答案，再提交本題。';
    status.textContent = '尚未作答';
    explanation.style.display = 'none';
    return;
  }

  const user = chosen.value;
  document.getElementById(`q${n}-${q.answer}`).classList.add('correct');

  if (user === q.answer) {
    feedback.className = 'feedback ok';
    feedback.innerHTML = `<strong>答對了</strong>`;
    status.textContent = '已提交：答對';
  } else {
    document.getElementById(`q${n}-${user}`).classList.add('wrong');
    feedback.className = 'feedback bad';
    feedback.innerHTML = `<strong>答錯了</strong>`;
    status.textContent = '已提交：答錯';
  }
  explanation.style.display = 'block';
}

function resetQuestion(n) {
  document.querySelectorAll(`input[name="q${n}"]`).forEach(el => { el.checked = false; });
  letters.forEach(letter => {
    document.getElementById(`q${n}-${letter}`).classList.remove('correct', 'wrong');
  });
  const feedback = document.getElementById(`feedback-${n}`);
  const explanation = document.getElementById(`explanation-${n}`);
  feedback.className = 'feedback';
  feedback.innerHTML = '';
  explanation.style.display = 'none';
  document.getElementById(`status-${n}`).textContent = '尚未提交';
}

render();
</script>
</body>
</html>
